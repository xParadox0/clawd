<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clawd WebChat</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;height:100dvh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:680px;height:100dvh;background:#fff;display:flex;flex-direction:column;box-shadow:0 0 24px rgba(0,0,0,.08)}
.hdr{background:#5546be;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px}
.hdr .av{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.hdr h1{font-size:15px;font-weight:600}.hdr p{font-size:12px;opacity:.75;margin-top:2px}
#dot{width:8px;height:8px;border-radius:50%;background:#f87171;margin-left:auto;transition:background .3s}
#dot.on{background:#4ade80}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.bub{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.bub.u{align-self:flex-end;background:#5546be;color:#fff;border-bottom-right-radius:4px}
.bub.b{align-self:flex-start;background:#f0f2f5;color:#111;border-bottom-left-radius:4px}
.t{font-size:11px;opacity:.5;margin-top:4px}.u .t{text-align:right}
.typing{align-self:flex-start;display:none;gap:4px;padding:10px 14px;background:#f0f2f5;border-radius:16px;border-bottom-left-radius:4px}
.typing.on{display:flex}
.typing span{width:7px;height:7px;background:#aaa;border-radius:50%;animation:bop 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#bbb}
.empty .ic{font-size:38px}.empty p{font-size:13px}
.inp{padding:10px 14px;border-top:1px solid #eee;display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;resize:none;border:1.5px solid #ddd;border-radius:20px;padding:9px 14px;font-size:14px;font-family:inherit;max-height:120px;outline:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:#5546be}
button{width:40px;height:40px;flex-shrink:0;background:#5546be;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s}
button:hover{background:#4438a8}button:active{transform:scale(.92)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="av">🦞</div>
    <div><h1>Clawd</h1><p>Powered by Claude Desktop</p></div>
    <div id="dot"></div>
  </div>
  <div class="msgs" id="msgs">
    <div class="empty" id="empty"><div class="ic">🦞</div><p>Send a message to get started</p></div>
  </div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <div class="inp">
    <textarea id="input" placeholder="Message Clawd…" rows="1" autofocus></textarea>
    <button id="send">&#10148;</button>
  </div>
</div>
<script>
const $msgs=document.getElementById('msgs'),$inp=document.getElementById('input'),
      $send=document.getElementById('send'),$empty=document.getElementById('empty'),
      $dot=document.getElementById('dot'),$typing=document.getElementById('typing');
const sock=io({query:{name:'WebUser'}});
sock.on('connect',()=>$dot.classList.add('on'));
sock.on('disconnect',()=>$dot.classList.remove('on'));
sock.on('history',msgs=>msgs.forEach(m=>add(m.direction==='inbound'?'u':'b',m.content,m.timestamp)));
sock.on('bot_message',({content,timestamp})=>{$typing.classList.remove('on');add('b',content,timestamp)});
function add(role,text,ts){
  if($empty)$empty.style.display='none';
  const d=document.createElement('div');
  d.className='bub '+role;
  d.innerHTML=`<div>${esc(text)}</div><div class="t">${ft(ts)}</div>`;
  $msgs.appendChild(d);$msgs.scrollTop=$msgs.scrollHeight;
}
function send(){
  const t=$inp.value.trim();if(!t)return;
  sock.emit('message',t);add('u',t,Date.now());
  $inp.value='';$inp.style.height='auto';
  setTimeout(()=>{$typing.classList.add('on');$msgs.scrollTop=$msgs.scrollHeight},80);
}
$send.onclick=send;
$inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
$inp.oninput=()=>{$inp.style.height='auto';$inp.style.height=Math.min($inp.scrollHeight,120)+'px'};
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const ft=ts=>new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
